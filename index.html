<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Cognito</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Study Cognito</h1>
    <p>An AI-powered study planner built for hackers.</p>

    <label>Hacker Goal</label>
    <input type="text" id="goal" placeholder="e.g. Web Security, Backend APIs, CTF Basics" />

    <label>Hours per day</label>
    <input type="number" id="hours" placeholder="e.g. 3" />

    <label>Planning duration (days)</label>
    <input type="number" id="days" placeholder="e.g. 7" />

    <button onclick="generatePlan()">Generate Hacker Plan</button>

    <div id="output"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
